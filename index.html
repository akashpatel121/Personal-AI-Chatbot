<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Document Chatbot</title>
    <link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  </head>
  <body>
    <div class="chat-container">
      <div class="chat-box" id="chatBox">
        <div class="welcome-message">Hello! How can I assist you?</div>
      </div>
      <form enctype="multipart/form-data" class="upload">
        <input type="file" multiple />
        <span class="selected-files"v></span>
      </form>
      <div class="chat-input">
        <button class="options"><i class="fa-solid fa-plus"></i></button>
        </label>
        <input type="file" id="fileInput" hidden />
        <input
          type="text"
          id="userInput"
          placeholder="Ask something..."
          onkeypress="handleKeyPress(event)"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
